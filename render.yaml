# ─────────────────────────────────────────────────────────────
# render.yaml — Configuración de despliegue en Render.com
# Sube este proyecto a GitHub y conéctalo en render.com
# ─────────────────────────────────────────────────────────────

services:
  # ── Servicio 1: API FastAPI (Backend) ──────────────────────
  - type: web
    name: terraflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health

  # ── Servicio 2: Frontend (Nginx con HTML estático) ─────────
  - type: static
    name: terraflow-frontend
    staticPublishPath: frontend
    plan: free
    routes:
      - path: "/*"
        methods:
          - GET
          - HEAD
        missingRoutePolicy: serve_index_html
